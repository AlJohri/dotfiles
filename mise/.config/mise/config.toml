"brew:duti" = "latest"

[settings]
experimental = true
log_level = "warn"
ignored_config_paths = []
not_found_auto_install = false

[settings.github]
use_git_credentials = true

[settings.ruby]
compile = false

[settings.cargo]
binstall = true
