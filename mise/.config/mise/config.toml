"pacman:fish" = "latest"
"pacman:omarchy-fish" = "latest"
"pacman:omarchy-zsh" = "latest"
"pacman:bolt" = "latest"
"pacman:caligula" = "latest"
"pacman:nvtop" = "latest"
"pacman:fprintd" = "latest"
"pacman:sshpass" = "latest"
"pacman:tcpdump" = "latest"
"pacman:tigervnc" = "latest"
"pacman:tmux" = "latest"
"pacman:wayvnc" = "latest"
"pacman:wget" = "latest"
"pacman:xclip" = "latest"
"pacman:git-delta" = "latest"             # NOTE: also a [tools] entry (delta); redundant, cleanup TBD
"pacman:sublime-text-4" = "latest"
"pacman:tree" = "latest"
"pacman:visual-studio-code-bin" = "latest"
"pacman:pandoc-cli" = "latest"
"pacman:kitty" = "latest"                 # kitten icat for terminal image rendering
"pacman:chafa" = "latest"                 # terminal image rendering
# webkitgtk-6.0: build dep of mip.rs (cargo tool in [tools] above). Remove both together;
# to uninstall: delete + `sudo pacman -Rns webkitgtk-6.0`.
"pacman:webkitgtk-6.0" = "latest"
"pacman:wine" = "latest"
