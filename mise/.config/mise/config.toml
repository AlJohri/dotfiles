# Pinned to fork until https://github.com/kunobi-ninja/kache PR merges.
# `combined-fixes` merges two feature branches:
#   1. fix/normalize-target-dir-paths — workspace target dir normalised in
#      cache keys + remap-path-prefix; stable cache keys across worktrees.
#   2. fix/codesign-verify-before-resign — only re-codesign on cache restore
#      when `codesign --verify` fails. ld64-emitted ad-hoc signatures survive
#      hardlinking; unconditional re-signing was non-deterministic and broke
#      proc-macro / dylib content stability across cold→warm rebuilds.
# Switch back to upstream by commenting this line and uncommenting the
# github: line below.
"cargo:https://github.com/AlJohri/kache" = { version = "branch:combined-fixes", crate = "kache" }
# "github:kunobi-ninja/kache" = "latest"
