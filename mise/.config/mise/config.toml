# System packages, applied by `mise bootstrap packages apply` in setup-omarchy.sh /
# setup-macos.sh (replacing the big imperative pacman/brew blocks). mise applies only
# the entries matching the current OS's package manager. What stays imperative in the
# scripts: AUR (yay), `omarchy install …` wrappers, curl installers, one-off
# install-then-configure steps, and the early-ordering github-cli/git/gh (needed before
# the mise binary exists). pacman can't pin (Arch repos keep only latest), so "latest".
[bootstrap.packages]

# --- Linux / omarchy (pacman) ---
"pacman:bc" = "latest"                    # decimal shell arithmetic in scripts
"pacman:bind-tools" = "latest"
"pacman:stow" = "latest"
"pacman:7zip" = "latest"
"pacman:make" = "latest"
"pacman:most" = "latest"
