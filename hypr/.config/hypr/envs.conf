# Extra env variables
# env = MY_GLOBAL_ENV,setting

# Add ~/bin to PATH
env = PATH,$HOME/bin:$PATH

# HiDPI scaling for XWayland apps (since force_zero_scaling = true).
# NOTE: do NOT set GDK_SCALE to an integer here — Steam applies it to its own
# window geometry, so the window doubles in size on every resize. Steam's own
# UI scaling knob makes the UI legible without touching window geometry.
env = STEAM_FORCE_DESKTOPUI_SCALING,1.25
