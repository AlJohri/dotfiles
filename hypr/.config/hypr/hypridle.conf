general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Feed idle state to mutter-idle-bridge, which serves
# org.gnome.Mutter.IdleMonitor so Electron apps (Slack, 1Password) can see idle
# at all. Chromium only reads org_kde_kwin_idle (absent on Hyprland) or that
# D-Bus name, never ext-idle-notify -- so without this, Slack thinks you are at
# the keyboard forever and pins your presence dot green.
# Keep `timeout` in sync with the bridge's --source-timeout (default 30).
listener {
    timeout = 30
    on-timeout = mutter-idle-bridge notify idle
    on-resume = mutter-idle-bridge notify active
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    # Skip the screensaver if the display is already off (e.g. manual SUPER CTRL D
    # dpms-off) — reads live DPMS state so there's no flag to assert/clear.
    on-timeout = pidof hyprlock || ! hyprctl monitors -j | grep -q '"dpmsStatus": true' || omarchy-launch-screensaver
}

# Screen off after ~2.5 min, no lock (no password on return).
# Replaces omarchy's lock listener (omarchy-system-lock / omarchy-system-wake),
# which also locked; restore that pair to re-enable locking.
listener {
    timeout = 152
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && pkill -f org.omarchy.screensaver
}
