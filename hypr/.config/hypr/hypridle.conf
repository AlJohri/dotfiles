general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Screen off after ~2.5 min, no lock (no password on return).
# Replaces omarchy's lock listener (omarchy-system-lock / omarchy-system-wake),
# which also locked; restore that pair to re-enable locking.
listener {
    timeout = 152
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && pkill -f org.omarchy.screensaver
}
